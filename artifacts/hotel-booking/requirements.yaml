packages:
  "framer-motion": "For smooth page transitions and micro-interactions"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod validation integration for forms"
  "date-fns": "For formatting dates in bookings and searches"
  "lucide-react": "For beautiful consistent iconography"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility for merging Tailwind classes"

images:
  - path: "artifacts/hotel-booking/public/images/logo-mark.png"
    description: "Minimalist, luxury geometric logo mark for a high-end hotel booking platform, deep indigo and gold colors, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/hotel-booking/public/images/abstract-mesh.png"
    description: "Abstract gradient mesh background in deep indigo, violet, and soft gold with soft light leaks, premium luxury feel"
    aspect_ratio: "16:9"

notes:
  - Using generated API client hooks from @workspace/api-client-react
  - Auth context manages global user state via /api/auth/me
  - UI relies heavily on glassmorphism and modern SaaS aesthetics
